<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demand Gen Video Ad Report &mdash; Tattooing 101</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0a0b;--surface:#141416;--surface-2:#1c1c20;--surface-3:#1a1a1e;
  --border:#2a2a30;--border-hover:#3a3a44;
  --text:#e8e8ed;--text-dim:#8a8a95;--text-muted:#555560;
  --accent:#6366f1;--accent-light:#818cf8;--accent-glow:rgba(99,102,241,0.15);--accent-glow-strong:rgba(99,102,241,0.25);
  --green:#22c55e;--green-dim:rgba(34,197,94,0.12);
  --yellow:#eab308;--yellow-dim:rgba(234,179,8,0.12);
  --red:#ef4444;--red-dim:rgba(239,68,68,0.12);
  --orange:#f97316;--orange-dim:rgba(249,115,22,0.12);
  --blue:#3b82f6;--blue-dim:rgba(59,130,246,0.12);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Inter",-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
a{color:var(--accent-light);text-decoration:none;transition:color .2s}a:hover{color:var(--accent);text-decoration:underline}

/* Hero */
.hero{text-align:center;padding:72px 24px 56px;background:linear-gradient(180deg,rgba(99,102,241,.1) 0%,rgba(99,102,241,.02) 60%,transparent 100%);border-bottom:1px solid var(--border);position:relative;overflow:hidden}
.hero::before{content:"";position:absolute;top:-200px;left:50%;transform:translateX(-50%);width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(99,102,241,.08) 0%,transparent 70%);pointer-events:none}
.hero .badge{display:inline-block;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--accent);background:var(--accent-glow);padding:6px 18px;border-radius:100px;margin-bottom:20px;border:1px solid rgba(99,102,241,.2)}
.hero h1{font-size:clamp(2rem,5vw,3rem);font-weight:900;letter-spacing:-.03em;margin-bottom:12px;background:linear-gradient(135deg,var(--text) 0%,var(--text-dim) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero p{color:var(--text-dim);font-size:1.05rem;max-width:580px;margin:0 auto}

.container{max-width:1200px;margin:0 auto;padding:40px 24px 80px}

/* Summary stat boxes */
.stat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;margin-bottom:56px}
.stat-box{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px 20px;text-align:center;transition:border-color .3s,transform .2s;position:relative;overflow:hidden}
.stat-box:hover{border-color:var(--border-hover);transform:translateY(-2px)}
.stat-box .value{font-size:1.7rem;font-weight:900;letter-spacing:-.02em;line-height:1.2}
.stat-box .label{font-size:.7rem;color:var(--text-dim);margin-top:6px;text-transform:uppercase;letter-spacing:1px;font-weight:600}
.stat-box.accent{border-color:rgba(99,102,241,.3)}
.stat-box.accent .value{color:var(--accent-light)}
.stat-box.green .value{color:var(--green)}
.stat-box.accent::after{content:"";position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--accent-light))}

/* Campaign sections */
.campaign-section{margin-bottom:48px}
.campaign-header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;padding:20px 24px;background:var(--surface);border:1px solid var(--border);border-radius:14px;margin-bottom:20px}
.campaign-header-left{display:flex;align-items:center;gap:12px;flex:1;min-width:0}
.campaign-header h2{font-size:1.15rem;font-weight:800;letter-spacing:-.01em;overflow:hidden;text-overflow:ellipsis}
.campaign-status{font-size:10px;font-weight:700;padding:4px 10px;border-radius:6px;text-transform:uppercase;letter-spacing:.8px;flex-shrink:0;white-space:nowrap}
.status-enabled{background:var(--green-dim);color:var(--green)}
.status-paused{background:var(--yellow-dim);color:var(--yellow)}
.status-removed{background:var(--red-dim);color:var(--red)}

.campaign-stats{display:flex;gap:20px;flex-wrap:wrap;font-size:.8rem}
.campaign-stat{display:flex;flex-direction:column;align-items:center}
.campaign-stat .cs-val{font-weight:800;font-size:1rem}
.campaign-stat .cs-label{color:var(--text-dim);font-size:.65rem;text-transform:uppercase;letter-spacing:.5px}

/* Ad cards */
.ad-grid{display:grid;grid-template-columns:1fr;gap:16px}
.ad-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px;transition:border-color .3s,box-shadow .3s}
.ad-card:hover{border-color:var(--border-hover);box-shadow:0 4px 24px rgba(0,0,0,.3)}
.ad-card-header{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:16px}
.ad-name{font-size:1.05rem;font-weight:700;letter-spacing:-.01em;flex:1}
.ad-group-tag{font-size:.65rem;color:var(--text-muted);font-weight:500;margin-top:4px}
.ad-badge{font-size:10px;font-weight:700;padding:3px 10px;border-radius:6px;text-transform:uppercase;letter-spacing:.8px;flex-shrink:0}

/* Metrics row */
.metrics-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px;margin-bottom:20px}
.metric-cell{background:var(--bg);border-radius:10px;padding:12px;display:flex;flex-direction:column;gap:2px}
.metric-cell .m-val{font-size:1.1rem;font-weight:800}
.metric-cell .m-label{font-size:.65rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.metric-cell.highlight{border:1px solid rgba(99,102,241,.3)}
.metric-cell .m-val.good{color:var(--green)}
.metric-cell .m-val.warn{color:var(--yellow)}
.metric-cell .m-val.bad{color:var(--red)}

/* Video grid */
.videos-label{font-size:.75rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;font-weight:700;margin-bottom:12px}
.video-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.video-thumb{position:relative;border-radius:10px;overflow:hidden;background:var(--bg);border:1px solid var(--border);transition:border-color .3s,transform .2s}
.video-thumb:hover{border-color:var(--accent);transform:scale(1.02)}
.video-thumb a{display:block}
.video-thumb img{width:100%;height:auto;display:block;aspect-ratio:16/9;object-fit:cover}
.video-thumb .play-overlay{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:44px;height:44px;background:rgba(0,0,0,.7);border-radius:50%;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .3s;pointer-events:none}
.video-thumb:hover .play-overlay{opacity:1}
.play-overlay svg{width:18px;height:18px;fill:white;margin-left:2px}
.video-title{padding:8px 10px;font-size:.72rem;color:var(--text-dim);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* Zero impression section */
.zero-section{margin-top:56px}
.zero-toggle{display:flex;align-items:center;gap:10px;cursor:pointer;padding:16px 20px;background:var(--surface);border:1px solid var(--border);border-radius:12px;font-size:.9rem;font-weight:700;color:var(--text-dim);transition:border-color .2s;user-select:none}
.zero-toggle:hover{border-color:var(--border-hover)}
.zero-toggle .chevron{transition:transform .3s;font-size:.8rem}
.zero-toggle.open .chevron{transform:rotate(90deg)}
.zero-toggle .count{font-size:.7rem;background:var(--surface-2);padding:2px 8px;border-radius:100px;color:var(--text-muted);font-weight:600}
.zero-content{display:none;margin-top:16px}
.zero-content.open{display:block}
.zero-ad{padding:14px 20px;background:var(--surface);border:1px solid var(--border);border-radius:10px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;gap:12px;opacity:.6}
.zero-ad .zero-name{font-size:.85rem;font-weight:600}
.zero-ad .zero-campaign{font-size:.7rem;color:var(--text-muted)}

/* Footer */
.footer{text-align:center;padding:40px 24px;border-top:1px solid var(--border);margin-top:40px;color:var(--text-muted);font-size:.8rem}
.footer .ts{color:var(--text-dim);font-weight:600}

/* Responsive */
@media(max-width:768px){
  .hero{padding:56px 16px 40px}
  .container{padding:24px 16px 60px}
  .stat-row{grid-template-columns:repeat(2,1fr);gap:10px}
  .stat-box{padding:16px 12px}
  .stat-box .value{font-size:1.3rem}
  .campaign-header{flex-direction:column;align-items:flex-start}
  .campaign-stats{width:100%;justify-content:space-between}
  .metrics-row{grid-template-columns:repeat(3,1fr)}
  .video-grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr))}
  .ad-card{padding:16px}
}
@media(max-width:480px){
  .stat-row{grid-template-columns:repeat(2,1fr)}
  .metrics-row{grid-template-columns:repeat(2,1fr)}
  .video-grid{grid-template-columns:1fr 1fr}
}

/* Animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.animate{animation:fadeUp .5s ease-out forwards;opacity:0}
.delay-1{animation-delay:.05s}.delay-2{animation-delay:.1s}.delay-3{animation-delay:.15s}
.delay-4{animation-delay:.2s}.delay-5{animation-delay:.25s}.delay-6{animation-delay:.3s}
</style>
</head>

// Helpers
function fmt(n){return n.toLocaleString("en-US")}
function fmtMoney(n){return "$"+n.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2})}
function fmtPct(n){return n.toFixed(2)+"%"}
function cleanAdName(name){
  return name.replace(/\s*\|\s*Video\s*\|\s*Instream,?\s*Short\s*\|\s*Book a call$/i,"").trim();
}
function cleanVideoTitle(title){
  return title.replace(/\.mp4$/i,"").trim();
}
function statusClass(status){
  if(status==="ENABLED")return"status-enabled";
  if(status==="PAUSED")return"status-paused";
  return"status-removed";
}
function escHtml(s){var d=document.createElement("div");d.textContent=s;return d.innerHTML;}

// Compute totals
var totalImp=RAW_DATA.reduce(function(s,a){return s+a.impressions},0);
var totalClicks=RAW_DATA.reduce(function(s,a){return s+a.clicks},0);
var totalCost=RAW_DATA.reduce(function(s,a){return s+a.cost},0);
var totalConv=RAW_DATA.reduce(function(s,a){return s+a.conversions},0);
var overallCTR=totalImp>0?(totalClicks/totalImp*100):0;
var overallCPA=totalConv>0?totalCost/totalConv:null;

// Summary stats
var statsData=[
  {label:"Total Impressions",value:fmt(totalImp),cls:""},
  {label:"Total Clicks",value:fmt(totalClicks),cls:""},
  {label:"Overall CTR",value:fmtPct(overallCTR),cls:"accent"},
  {label:"Total Cost",value:fmtMoney(totalCost),cls:""},
  {label:"Conversions",value:fmt(totalConv),cls:"green"},
  {label:"CPA",value:overallCPA!==null?fmtMoney(overallCPA):"\u2014",cls:"accent"}
];
document.getElementById("summaryStats").innerHTML=statsData.map(function(s,i){
  return '<div class="stat-box '+s.cls+' animate delay-'+(i+1)+'"><div class="value">'+s.value+'</div><div class="label">'+s.label+'</div></div>';
}).join("");

// Group by campaign
var campaigns={};
RAW_DATA.forEach(function(ad){
  if(!campaigns[ad.campaign_name])campaigns[ad.campaign_name]={status:ad.campaign_status,ads:[]};
  campaigns[ad.campaign_name].ads.push(ad);
});

// Separate active vs zero-impression
var activeCampaigns={};
var zeroAds=[];
Object.keys(campaigns).forEach(function(name){
  var camp=campaigns[name];
  var activeAds=camp.ads.filter(function(a){return a.impressions>0});
  var inactiveAds=camp.ads.filter(function(a){return a.impressions===0});
  if(activeAds.length>0){
    activeAds.sort(function(a,b){return b.impressions-a.impressions});
    activeCampaigns[name]={status:camp.status,ads:activeAds};
  }
  inactiveAds.forEach(function(a){zeroAds.push(a)});
});

// Render active campaigns
var sectionsHTML="";
Object.keys(activeCampaigns).forEach(function(campName){
  var camp=activeCampaigns[campName];
  var cImp=camp.ads.reduce(function(s,a){return s+a.impressions},0);
  var cClicks=camp.ads.reduce(function(s,a){return s+a.clicks},0);
  var cCost=camp.ads.reduce(function(s,a){return s+a.cost},0);
  var cConv=camp.ads.reduce(function(s,a){return s+a.conversions},0);
  var cCTR=cImp>0?(cClicks/cImp*100):0;
  var cCPA=cConv>0?cCost/cConv:null;

  sectionsHTML+='<div class="campaign-section">';
  sectionsHTML+='<div class="campaign-header">';
  sectionsHTML+='<div class="campaign-header-left">';
  sectionsHTML+='<span class="campaign-status '+statusClass(camp.status)+'">'+camp.status+'</span>';
  sectionsHTML+='<h2>'+escHtml(campName)+'</h2>';
  sectionsHTML+='</div>';
  sectionsHTML+='<div class="campaign-stats">';
  sectionsHTML+='<div class="campaign-stat"><span class="cs-val">'+fmt(cImp)+'</span><span class="cs-label">Impressions</span></div>';
  sectionsHTML+='<div class="campaign-stat"><span class="cs-val">'+fmt(cClicks)+'</span><span class="cs-label">Clicks</span></div>';
  sectionsHTML+='<div class="campaign-stat"><span class="cs-val">'+fmtPct(cCTR)+'</span><span class="cs-label">CTR</span></div>';
  sectionsHTML+='<div class="campaign-stat"><span class="cs-val">'+fmtMoney(cCost)+'</span><span class="cs-label">Cost</span></div>';
  sectionsHTML+='<div class="campaign-stat"><span class="cs-val">'+fmt(cConv)+'</span><span class="cs-label">Conv</span></div>';
  sectionsHTML+='<div class="campaign-stat"><span class="cs-val">'+(cCPA!==null?fmtMoney(cCPA):"\u2014")+'</span><span class="cs-label">CPA</span></div>';
  sectionsHTML+='</div></div>';
  sectionsHTML+='<div class="ad-grid">';

  var maxCTR=Math.max.apply(null,camp.ads.map(function(a){return a.ctr}));

  camp.ads.forEach(function(ad){
    var adName=cleanAdName(ad.ad_name);
    var ctrColor=ad.ctr>=1.5?"good":ad.ctr>=0.5?"":"bad";
    var engColor=ad.engagement_rate>=45?"good":ad.engagement_rate>=30?"":"warn";
    var isTopCTR=ad.ctr===maxCTR&&camp.ads.length>1;

    var videosHTML="";
    if(ad.videos&&ad.videos.length>0){
      videosHTML+='<div class="videos-label">Video Assets ('+ad.videos.length+')</div>';
      videosHTML+='<div class="video-grid">';
      ad.videos.forEach(function(v){
        var vTitle=cleanVideoTitle(v.title);
        videosHTML+='<div class="video-thumb">';
        videosHTML+='<a href="https://www.youtube.com/watch?v='+v.video_id+'" target="_blank" rel="noopener">';
        videosHTML+='<img src="https://img.youtube.com/vi/'+v.video_id+'/mqdefault.jpg" alt="'+escHtml(vTitle)+'" loading="lazy">';
        videosHTML+='<div class="play-overlay"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>';
        videosHTML+='</a>';
        videosHTML+='<div class="video-title" title="'+escHtml(vTitle)+'">'+escHtml(vTitle)+'</div>';
        videosHTML+='</div>';
      });
      videosHTML+='</div>';
    }

    sectionsHTML+='<div class="ad-card">';
    sectionsHTML+='<div class="ad-card-header"><div>';
    sectionsHTML+='<div class="ad-name">'+(isTopCTR?"\u2605 ":"")+escHtml(adName)+'</div>';
    sectionsHTML+='<div class="ad-group-tag">'+escHtml(ad.ad_group_name)+'</div>';
    sectionsHTML+='</div>';
    sectionsHTML+='<span class="ad-badge '+statusClass(ad.ad_status)+'">'+ad.ad_status+'</span>';
    sectionsHTML+='</div>';
    sectionsHTML+='<div class="metrics-row">';
    sectionsHTML+='<div class="metric-cell"><span class="m-val">'+fmt(ad.impressions)+'</span><span class="m-label">Impressions</span></div>';
    sectionsHTML+='<div class="metric-cell"><span class="m-val">'+fmt(ad.clicks)+'</span><span class="m-label">Clicks</span></div>';
    sectionsHTML+='<div class="metric-cell'+(isTopCTR?" highlight":"")+ '"><span class="m-val '+ctrColor+'">'+fmtPct(ad.ctr)+'</span><span class="m-label">CTR</span></div>';
    sectionsHTML+='<div class="metric-cell"><span class="m-val">'+fmtMoney(ad.cost)+'</span><span class="m-label">Cost</span></div>';
    sectionsHTML+='<div class="metric-cell"><span class="m-val">'+fmt(ad.conversions)+'</span><span class="m-label">Conversions</span></div>';
    sectionsHTML+='<div class="metric-cell"><span class="m-val">'+(ad.cpa!==null?fmtMoney(ad.cpa):"\u2014")+'</span><span class="m-label">CPA</span></div>';
    sectionsHTML+='<div class="metric-cell"><span class="m-val '+engColor+'">'+fmtPct(ad.engagement_rate)+'</span><span class="m-label">Engage Rate</span></div>';
    sectionsHTML+='<div class="metric-cell"><span class="m-val">'+fmt(ad.all_conversions)+'</span><span class="m-label">All Conv</span></div>';
    sectionsHTML+='</div>';
    sectionsHTML+=videosHTML;
    sectionsHTML+='</div>';
  });

  sectionsHTML+='</div></div>';
});

document.getElementById("campaignSections").innerHTML=sectionsHTML;

// (Paused campaigns removed - active DG only)

// Timestamp
var now=new Date();
document.getElementById("timestamp").textContent=now.toLocaleDateString("en-US",{
  weekday:"long",year:"numeric",month:"long",day:"numeric",hour:"2-digit",minute:"2-digit"
});
</script>
</body>
</html>
